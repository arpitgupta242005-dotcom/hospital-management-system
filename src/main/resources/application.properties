# Database URL Config (Local pe localhost chalega, Railway pe dynamic database url)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/hospitaldb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kaku24gupta}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Data initialization sirf tab chalega jab database khali ho
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=conditional
spring.sql.init.data-locations=classpath:data.sql