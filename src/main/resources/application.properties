# Server Port Config (Railway ka dynamic port uthayega)
server.port=${PORT:8080}

# Database URL Config
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/hospitaldb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kaku24gupta}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Data initialization settings (Isko strictly ALWAYS ya NEVER rakho)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=ALWAYS
spring.sql.init.data-locations=classpath:data.sql